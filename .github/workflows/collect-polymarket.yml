name: collect-polymarket

# Daily incremental crawl of newly-resolved Polymarket BTC/ETH "above ___ on"
# strike ladders. --since-days 3 only re-discovers the last few days of expiries
# and --merge folds them into the combined ladder CSVs already in the repo.

on:
  schedule:
    - cron: '15 1 * * *'        # 01:15 UTC daily (after the 16:00 UTC expiries settle)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-collection
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --quiet pandas
      - name: Incremental crawl + merge
        run: python crawl_polymarket.py --since-days 3 --merge
      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "data: polymarket daily increment [skip ci]"
          git pull --rebase origin main
          git push
