name: sync-db

# Upsert the latest CSV partitions into Postgres (the queryable layer). Runs a few
# hours after collection. No-ops cleanly until the DATABASE_URL secret is set, so
# it's safe to merge before the DB exists.
#   gh secret set DATABASE_URL -R intrepidcanadian/polymarketresearch --body 'postgresql://...'

on:
  schedule:
    - cron: '40 */6 * * *'      # every 6h, offset from collectors
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Load recent partitions into Postgres
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret not set — skipping DB sync."; exit 0
          fi
          pip install --quiet "psycopg[binary]" pandas
          python db_load.py --init
          python db_load.py --recent 2
